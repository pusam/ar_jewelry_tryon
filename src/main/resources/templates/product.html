<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${jewelry.name} + ' - AR Jewelry'">상품 상세</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
    <div class="container">
        <a href="/" class="back-link">← 목록으로</a>
        <h1 class="logo">✦ AR Jewelry</h1>
    </div>
</header>

<main class="container">
    <div class="product-detail">
        <div class="product-image">
            <img th:src="${jewelry.imageUrl}" th:alt="${jewelry.name}" onerror="this.src='/images/placeholder.svg'">
        </div>
        <div class="product-info">
            <span class="badge large" th:text="${jewelry.type.displayName}"></span>
            <h2 th:text="${jewelry.name}"></h2>
            <p class="brand" th:text="${jewelry.brand}"></p>
            <p class="price large" th:text="${#numbers.formatInteger(jewelry.price, 1, 'COMMA')} + '원'"></p>
            <p class="description" th:text="${jewelry.description}"></p>
            <div class="product-actions">
                <a th:href="@{'/tryon/' + ${jewelry.id}}" class="btn btn-primary btn-large tryon-btn"
                   th:data-id="${jewelry.id}">
                    📸 AR 착용하러가기
                </a>
                <a th:href="${jewelry.externalUrl}" class="btn btn-outline btn-large" target="_blank">
                    🛒 구매하러가기
                </a>
            </div>
        </div>
    </div>
</main>

<script src="/js/pwa-install.js"></script>
</body>
</html>
